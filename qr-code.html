<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe KZ - QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #faf9f7;
            color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        #qrcode canvas {
            border: 10px solid white;
            background: white;
        }

        .instructions {
            font-size: 0.9rem;
            color: #666;
            margin-top: 30px;
            line-height: 1.8;
        }

        .button-group {
            margin-top: 25px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            border: 1px solid #2c2c2c;
            background: white;
            color: #2c2c2c;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #2c2c2c;
            color: white;
        }

        @media print {
            body {
                background: white;
            }

            .container {
                box-shadow: none;
                padding: 20px;
            }

            .button-group {
                display: none;
            }

            .instructions {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CAFE KZ</h1>
        <p class="tagline">scan to view menu</p>
        
        <div id="qrcode"></div>
        
        <p class="instructions">
            Scan this QR code with your phone camera to view the full menu.
        </p>

        <div class="button-group">
            <button onclick="window.print()">🖨️ Print</button>
            <button onclick="downloadQR()">⬇️ Download</button>
        </div>
    </div>

    <script>
        // Generate QR code pointing to the menu
        const menuUrl = 'https://github.com/danzemel15-hash/Cafe-KZ/blob/main/menu.html';
        
        const qrcode = new QRCode(document.getElementById('qrcode'), {
            text: menuUrl,
            width: 256,
            height: 256,
            colorDark: '#2c2c2c',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'cafe-kz-menu-qr.png';
            link.click();
        }
    </script>
</body>
</html>
